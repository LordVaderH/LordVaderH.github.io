<style>
    /* 1. 全站背景高清 */
    html {
        background: url("https://lordvaderh.github.io/images/bg.png") no-repeat center center fixed !important;
        background-size: cover !important;
    }

    body {
        background: transparent !important;
    }

    /* 2. 核心：长文章容器优化 - 增加磨砂感和边距 */
    .main {
        max-width: 850px !important;
        padding: 0 20px !important;
    }

    /* 给文章块增加一个“舒适层” */
    .post-content, .article-content, .post-entry, .first-entry {
        background: rgba(255, 255, 255, 0.85) !important; /* 增加厚度到0.85，保护眼睛 */
        backdrop-filter: blur(10px) !important; /* 适度的模糊，让背景不干扰文字 */
        -webkit-backdrop-filter: blur(10px) !important;
        border-radius: 16px !important;
        padding: 40px !important; /* 增加内边距，像书本一样留白 */
        margin-top: 20px !important;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important;
    }

    /* 3. 字体与行间距优化：拒绝密集恐惧症 */
    h1, h2, h3, p, li {
        color: #1a1a1a !important; /* 深灰色比纯黑更护眼 */
        line-height: 1.8 !important; /* 增大行高，让眼睛不累 */
        letter-spacing: 0.02em !important; /* 增加字间距 */
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif !important;
    }

    /* 4. 黑夜模式：深色护眼版 */
    .dark .post-content, .dark .article-content, .dark .post-entry, .dark .first-entry {
        background: rgba(20, 20, 23, 0.9) !important; /* 深邃但不全黑 */
        color: #e0e0e0 !important; /* 灰白字，不刺眼 */
    }

    .dark h1, .dark h2, .dark h3, .dark p, .dark li {
        color: #e0e0e0 !important;
        text-shadow: none !important; /* 黑夜模式下取消描边，减少虚影 */
    }

    /* 5. 模式区分：白天清新，黑夜沉稳 */
    .dark body { background-color: rgba(0,0,0,0.4) !important; }
</style>
