<style>
    /* 1. 统一背景图，全站高清 */
    html, body {
        background: url("https://lordvaderh.github.io/images/bg.png") no-repeat center center fixed !important;
        background-size: cover !important;
        background-color: transparent !important;
    }

    /* 2. 隐藏右上角的白天/黑夜切换按钮，全站统一视觉 */
    #theme-toggle {
        display: none !important;
    }

    /* 3. 统一容器：柔和的半透明磨砂玻璃 */
    .main, .first-entry, .post-entry, .post-content, .article-content, .list {
        background: rgba(255, 255, 255, 0.8) !important; /* 80%的白底，透出背景轮廓但不抢戏 */
        backdrop-filter: blur(12px) !important; /* 适度模糊，给文字提供干净的阅读区 */
        -webkit-backdrop-filter: blur(12px) !important;
        border-radius: 12px !important;
        border: none !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05) !important; /* 极弱的阴影增加质感 */
    }

    /* 4. 舒适的排版间距（保留你的喜好） */
    .main {
        max-width: 800px !important;
        margin: 0 auto !important;
    }
    .post-content, .article-content {
        padding: 20px 25px !important;
    }

    /* 5. 核心：彻底去掉阴影，使用柔和护眼色 */
    * {
        text-shadow: none !important; /* 杀掉所有文字白边和黑边 */
    }

    /* 标题：使用高级的深青灰色，微微加粗，清晰但不刺眼 */
    h1, h2, h3, h4, h5, h6, .post-title, .entry-header h2 {
        color: #2c3e50 !important; 
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif !important;
        font-weight: 600 !important; 
        margin-top: 1.5em !important;
        margin-bottom: 0.5em !important;
    }

    /* 正文：使用柔和的深灰色，恢复正常粗细，适合长文阅读 */
    p, a, li, span, code, blockquote, footer, .entry-content, .post-description {
        color: #333333 !important; 
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif !important;
        font-weight: 400 !important; /* 取消强制加粗，释放眼睛压力 */
        line-height: 1.8 !important; 
        letter-spacing: 0.02em !important;
    }

    /* 6. 防御性代码：强制覆盖系统的深色模式，防止主题偷偷变色 */
    .dark .main, .dark .first-entry, .dark .post-entry, .dark .post-content, .dark .article-content, .dark .list {
        background: rgba(255, 255, 255, 0.8) !important;
    }
    .dark h1, .dark h2, .dark h3, .dark h4, .dark h5, .dark h6, .dark .post-title, .dark .entry-header h2 {
        color: #2c3e50 !important;
    }
    .dark p, .dark a, .dark li, .dark span, .dark code, .dark blockquote, .dark footer, .dark .entry-content, .dark .post-description {
        color: #333333 !important;
    }
    
    /* 导航栏文本统一柔和化 */
    .nav a, .nav button, .logo {
        color: #2c3e50 !important;
    }
</style>
