<style>
    /* 1. 全站背景高清锁死 */
    html, body {
        background: url("https://lordvaderh.github.io/images/bg.png") no-repeat center center fixed !important;
        background-size: cover !important;
    }

    body {
        background-color: transparent !important;
    }

    /* 2. 容器深度透明化：解决长文章挡住背景的问题 */
    /* 我们把透明度从 0.2 降到 0.05，几乎全透明，只留一丝丝质感 */
    .main, .first-entry, .post-entry, .post-content, .article-content, .list {
        background: rgba(255, 255, 255, 0.05) !important; 
        backdrop-filter: none !important; 
        -webkit-backdrop-filter: none !important;
        border-radius: 8px !important;
        margin-bottom: 20px !important;
        /* 强制锁定文字为纯黑 */
        color: #000000 !important; 
        font-weight: 600 !important;
    }

    /* 3. 文字无敌补丁：解决“白字消失”或“黑字看不清” */
    /* 无论白天黑夜，无论背景多花，黑字加白边是唯一解 */
    .post-title, .entry-header h2, .entry-content, .post-header, p, span, a, li, h1, h2, h3, h4 {
        color: #000000 !important;
        text-shadow: 
            2px 2px 0 #fff, 
            -1px -1px 0 #fff, 
            1px -1px 0 #fff, 
            -1px 1px 0 #fff,
            0px 0px 5px rgba(255,255,255,0.8) !important; /* 加强白色描边 */
    }

    /* 4. 针对黑夜模式的特殊处理：防止它偷偷变回白字 */
    .dark .post-title, .dark .entry-header h2, .dark .entry-content, .dark p, .dark a, .dark li {
        color: #000000 !important;
    }

    /* 5. 模式区分度：只改变容器的极细微色调，不影响看图 */
    :not(.dark) .main { background: rgba(255, 255, 255, 0.1) !important; }
    .dark .main { background: rgba(0, 0, 0, 0.2) !important; }

    /* 导航栏透明 */
    .nav {
        background: transparent !important;
    }
</style>
