<style>
    /* 1. 强制全站（包括主页和博客页）显示背景图 */
    html, body {
        background-image: url("https://lordvaderh.github.io/images/bg.png") !important;
        background-attachment: fixed !important;
        background-size: cover !important;
        background-position: center !important;
        background-color: #121212 !important; /* 兜底深色 */
    }

    /* 2. 容器透明度与宽度优化 */
    .main {
        max-width: 900px !important;
        background: transparent !important;
    }

    /* --- 白天模式：清透感 --- */
    .post-entry, .post-content, .article-content, .list, .first-entry {
        background: rgba(255, 255, 255, 0.8) !important;
        backdrop-filter: blur(10px) !important;
        border-radius: 12px !important;
        color: #1a1a1a !important;
        margin-bottom: 20px !important;
    }

    /* --- 黑夜模式：彻底治愈“白内障” --- */
    /* 我们让容器变深，让文字变亮 */
    .dark .post-entry, .dark .post-content, .dark .article-content, .dark .list, .dark .first-entry {
        background: rgba(0, 0, 0, 0.85) !important; /* 接近纯黑的半透明 */
        backdrop-filter: blur(15px) !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        color: #ffffff !important; /* 强制文字纯白 */
    }

    /* 确保主页标题在黑夜模式下清晰 */
    .dark .entry-header h2, .dark .post-title, .dark .entry-content {
        color: #ffffff !important;
        text-shadow: 1px 1px 5px rgba(0,0,0,0.5) !important;
    }

    /* 3. 修复主页可能出现的空白背景 */
    .list {
        background: transparent !important;
    }
</style>
